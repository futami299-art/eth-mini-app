<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EthReward - Earn ETH</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="//libtl.com/sdk.js" data-zone="10819887" data-sdk="show_10819887"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #121212);
            color: var(--tg-theme-text-color, #ffffff);
            padding: 20px;
            min-height: 100vh;
        }
        
        .user-card {
            background: var(--tg-theme-secondary-bg-color, #1e1e1e);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            overflow: hidden;
        }
        
        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .user-info h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }
        
        .user-info p {
            font-size: 12px;
            opacity: 0.6;
        }
        
        .balance-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            padding: 24px 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .balance-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .balance-amount {
            font-size: 36px;
            font-weight: 800;
        }
        
        .balance-usd {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 8px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #1e1e1e);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 6px;
        }
        
        .ad-button {
            width: 100%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }
        
        .ad-button:active {
            transform: scale(0.97);
        }
        
        .ad-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .withdraw-btn {
            width: 100%;
            background: transparent;
            border: 2px solid #667eea;
            padding: 14px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .withdraw-btn:active {
            transform: scale(0.97);
            background: rgba(102, 126, 234, 0.1);
        }
        
        .info-text {
            font-size: 11px;
            text-align: center;
            opacity: 0.4;
            margin-top: 20px;
        }
        
        .limit-warning {
            background: rgba(245, 87, 108, 0.15);
            border: 1px solid #f5576c;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            color: #f5576c;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            opacity: 0.6;
        }
        
        @media (max-width: 480px) {
            body { padding: 15px; }
            .balance-amount { font-size: 28px; }
            .stat-value { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">Loading...</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
