<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EthReward - Earn ETH</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="//libtl.com/sdk.js" data-zone="10819887" data-sdk="show_10819887"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #0a0a2a 0%, #1a1a4a 100%);
            color: #ffffff;
            padding: 16px;
            min-height: 100vh;
        }

        /* Smooth Container */
        .container {
            max-width: 450px;
            margin: 0 auto;
        }

        /* User Card */
        .user-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .user-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .user-info p {
            font-size: 11px;
            opacity: 0.6;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 28px;
            padding: 24px 20px;
            margin-bottom: 16px;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .balance-card:active {
            transform: scale(0.99);
        }

        .balance-label {
            font-size: 13px;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 38px;
            font-weight: 800;
            font-family: monospace;
        }

        .balance-usd {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 6px;
        }

        /* Progress Bar */
        .progress-section {
            margin-top: 16px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 6px;
        }

        .progress-bar {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #FFD166, #FF6B6B);
            width: 0%;
            height: 100%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 14px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s ease;
        }

        .stat-box:active {
            transform: scale(0.97);
            background: rgba(255,255,255,0.1);
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD166, #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 4px;
        }

        /* Main Action Button */
        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(255,107,107,0.3);
        }

        .action-btn:active {
            transform: scale(0.97);
            box-shadow: 0 3px 10px rgba(255,107,107,0.3);
        }

        .action-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        /* Timer Display */
        .timer-box {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 14px 20px;
            margin-bottom: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .timer-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .timer-seconds {
            font-size: 32px;
            font-weight: 800;
            font-family: monospace;
            color: #FFD166;
        }

        /* Withdraw Section */
        .withdraw-btn {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid #667eea;
            padding: 14px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }

        .withdraw-btn:active {
            transform: scale(0.97);
            background: rgba(102,126,234,0.15);
        }

        .wallet-input-area {
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
            padding: 6px 6px 6px 18px;
            display: flex;
            gap: 8px;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .wallet-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 12px;
            font-family: monospace;
            outline: none;
        }

        .wallet-input-area input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .wallet-input-area button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .wallet-input-area button:active {
            transform: scale(0.95);
        }

        .info-note {
            font-size: 10px;
            text-align: center;
            opacity: 0.4;
            margin-top: 16px;
        }

        .warning-box {
            background: rgba(255,107,107,0.15);
            border: 1px solid #FF6B6B;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            margin-top: 12px;
            display: none;
            color: #FF6B6B;
        }

        .loading-box {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #FF6B6B;
            border-radius: 50%;
            margin: 0 auto 12px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading-box">
            <div class="spinner"></div>
            Loading...
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // User data
        const user = tg.initDataUnsafe?.user;
        const BOT_API_URL = 'https://eth-telegram-bot.onrender.com';

        // Constants
        const DAILY_LIMIT = 5;
        const REWARD_AMOUNT = 0.00005;
        const MIN_WITHDRAWAL = 0.001;
        const ETH_PRICE = 2000;

        // State
        let balance = 0;
        let todayCount = 0;
        let adActive = false;
        let timerInterval = null;

        // Load saved data
        function loadData() {
            if (!user?.id) return;
            
            const savedBalance = localStorage.getItem(`eb_balance_${user.id}`);
            const savedDate = localStorage.getItem(`eb_date_${user.id}`);
            const savedCount = localStorage.getItem(`eb_count_${user.id}`);
            const today = new Date().toISOString().split('T')[0];
            
            if (savedDate === today) {
                todayCount = parseInt(savedCount) || 0;
                balance = parseFloat(savedBalance) || 0;
            } else {
                todayCount = 0;
                balance = parseFloat(savedBalance) || 0;
                localStorage.setItem(`eb_date_${user.id}`, today);
                localStorage.setItem(`eb_count_${user.id}`, '0');
            }
            
            render();
        }

        // Save data
        function saveData() {
            if (!user?.id) return;
            localStorage.setItem(`eb_balance_${user.id}`, balance);
            localStorage.setItem(`eb_count_${user.id}`, todayCount);
        }

        // Add reward
        function addReward() {
            if (todayCount >= DAILY_LIMIT) {
                tg.showAlert(`Daily limit reached! You've claimed ${todayCount}/${DAILY_LIMIT} ads today.`);
                return false;
            }
            
            todayCount++;
            balance += REWARD_AMOUNT;
            saveData();
            render();
            
            tg.showAlert(`✅ Success! You earned ${REWARD_AMOUNT} ETH\n💰 New Balance: ${balance.toFixed(8)} ETH`);
            tg.HapticFeedback.notificationOccurred('success');
            
            // Schedule next notification (6 hours later)
            scheduleNotification();
            
            return true;
        }

        // Schedule notification
        function scheduleNotification() {
            const nextTime = new Date();
            nextTime.setHours(nextTime.getHours() + 6);
            
            fetch(`${BOT_API_URL}/api/schedule-notification`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: user?.id,
                    notify_at: nextTime.toISOString()
                })
            }).catch(e => console.log('Schedule error:', e));
        }

        // Show timer and wait
        function startTimer(seconds, onComplete) {
            let remaining = seconds;
            
            const timerHtml = `
                <div class="timer-box" id="timerBox">
                    <div class="timer-label">🎬 Watch ad to earn ${REWARD_AMOUNT} ETH</div>
                    <div class="timer-seconds" id="timerSeconds">${remaining}</div>
                    <div class="timer-label">Don't close the app</div>
                </div>
            `;
            
            const watchBtn = document.getElementById('watchAdBtn');
            watchBtn.insertAdjacentHTML('afterend', timerHtml);
            watchBtn.disabled = true;
            
            timerInterval = setInterval(() => {
                remaining--;
                const timerEl = document.getElementById('timerSeconds');
                if (timerEl) timerEl.textContent = remaining;
                
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    document.getElementById('timerBox')?.remove();
                    watchBtn.disabled = false;
                    onComplete();
                }
            }, 1000);
        }

        // Watch ad function
        function watchAd() {
            // Check limit
            if (todayCount >= DAILY_LIMIT) {
                tg.showAlert(`⚠️ Daily limit reached! You can watch ${DAILY_LIMIT} ads per day.`);
                return;
            }
            
            // Check if already watching
            if (adActive) {
                tg.showAlert('⏳ Please wait, ad is already playing...');
                return;
            }
            
            adActive = true;
            
            // Confirm before ad
            tg.showPopup({
                title: '📺 Watch Ad',
                message: `Watch a 15 second ad to earn ${REWARD_AMOUNT} ETH\n\n⚠️ Closing early = No reward!`,
                buttons: [
                    { id: 'watch', type: 'default', text: '🎬 Watch Now' },
                    { id: 'cancel', type: 'cancel', text: 'Cancel' }
                ]
            }, (buttonId) => {
                if (buttonId !== 'watch') {
                    adActive = false;
                    return;
                }
                
                // Check if Monetag SDK is available
                if (typeof window.show_10819887 !== 'undefined') {
                    try {
                        window.show_10819887({
                            onReward: () => {
                                // Start 15 second timer
                                startTimer(15, () => {
                                    addReward();
                                    adActive = false;
                                });
                            },
                            onClose: () => {
                                if (timerInterval) {
                                    clearInterval(timerInterval);
                                    timerInterval = null;
                                    document.getElementById('timerBox')?.remove();
                                    document.getElementById('watchAdBtn').disabled = false;
                                }
                                adActive = false;
                                tg.showAlert('❌ Ad closed early! No reward given.');
                                tg.HapticFeedback.notificationOccurred('error');
                            },
                            onError: () => {
                                adActive = false;
                                tg.showAlert('❌ Failed to load ad. Please try again.');
                            }
                        });
                    } catch(e) {
                        // Fallback mode
                        startTimer(15, () => {
                            addReward();
                            adActive = false;
                        });
                    }
                } else {
                    // Fallback mode (demo)
                    startTimer(15, () => {
                        addReward();
                        adActive = false;
                    });
                }
            });
        }

        // Withdraw function
        function withdraw() {
            if (balance < MIN_WITHDRAWAL) {
                tg.showAlert(`❌ Minimum withdrawal is ${MIN_WITHDRAWAL} ETH\nYour balance: ${balance.toFixed(8)} ETH\nNeed: ${(MIN_WITHDRAWAL - balance).toFixed(8)} more ETH`);
                return;
            }
            
            tg.showPopup({
                title: '💸 Withdraw ETH',
                message: `Amount: ${balance.toFixed(8)} ETH\n\nEnter your ETH wallet address:`,
                buttons: [{ id: 'ok', type: 'ok', text: 'Continue' }, { id: 'cancel', type: 'cancel' }]
            }, (buttonId) => {
                if (buttonId === 'ok') {
                    tg.showPopup({
                        title: 'Wallet Address',
                        message: 'Paste your ETH address (starts with 0x)',
                        type: 'prompt'
                    }, (result) => {
                        if (result && result.startsWith('0x') && result.length === 42) {
                            // Save withdrawal request
                            const requests = JSON.parse(localStorage.getItem(`eb_withdrawals_${user?.id}`) || '[]');
                            requests.push({
                                amount: balance,
                                wallet: result,
                                date: new Date().toISOString(),
                                status: 'pending'
                            });
                            localStorage.setItem(`eb_withdrawals_${user?.id}`, JSON.stringify(requests));
                            
                            const withdrawnAmount = balance;
                            balance = 0;
                            saveData();
                            render();
                            
                            tg.showAlert(`✅ Withdrawal request submitted!\nAmount: ${withdrawnAmount.toFixed(8)} ETH\nWallet: ${result.substring(0, 10)}...`);
                            tg.HapticFeedback.notificationOccurred('success');
                        } else {
                            tg.showAlert('❌ Invalid ETH address! Must be 42 characters starting with 0x');
                        }
                    });
                }
            });
        }

        // Save wallet address
        function saveWallet() {
            const input = document.getElementById('walletInput');
            const wallet = input?.value.trim();
            if (wallet && wallet.startsWith('0x') && wallet.length === 42) {
                localStorage.setItem(`eb_wallet_${user?.id}`, wallet);
                tg.showAlert('✅ Wallet address saved!');
                tg.HapticFeedback.impactOccurred('light');
            } else if (wallet) {
                tg.showAlert('❌ Invalid ETH address!');
            }
        }

        // Get profile picture
        function getProfilePic() {
            if (user?.photo_url) return user.photo_url;
            return null;
        }

        // Render UI
        function render() {
            const remaining = DAILY_LIMIT - todayCount;
            const usdValue = balance * ETH_PRICE;
            const progressPercent = (todayCount / DAILY_LIMIT) * 100;
            const profilePic = getProfilePic();
            const savedWallet = localStorage.getItem(`eb_wallet_${user?.id}`) || '';
            
            document.getElementById('app').innerHTML = `
                <!-- User Card -->
                <div class="user-card">
                    <div class="user-avatar">
                        ${profilePic ? `<img src="${profilePic}" onerror="this.innerHTML='👤'">` : '👤'}
                    </div>
                    <div class="user-info">
                        <h3>${user?.first_name || 'User'} ${user?.last_name || ''}</h3>
                        <p>ID: ${user?.id || '-'}</p>
                    </div>
                </div>
                
                <!-- Balance Card -->
                <div class="balance-card">
                    <div class="balance-label">💰 YOUR BALANCE</div>
                    <div class="balance-amount">${balance.toFixed(8)} ETH</div>
                    <div class="balance-usd">≈ $${usdValue.toFixed(2)} USD</div>
                    <div class="progress-section">
                        <div class="progress-text">
                            <span>Daily Progress</span>
                            <span>${todayCount}/${DAILY_LIMIT}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progressPercent}%"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-number">${todayCount}</div>
                        <div class="stat-label">Today's Claims</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${remaining}</div>
                        <div class="stat-label">Remaining</div>
                    </div>
                </div>
                
                <!-- Watch Ad Button -->
                <button class="action-btn" id="watchAdBtn" ${todayCount >= DAILY_LIMIT ? 'disabled' : ''}>
                    🎬 Watch Ad & Earn ${REWARD_AMOUNT} ETH
                </button>
                
                <!-- Withdraw Section -->
                <button class="withdraw-btn" id="withdrawBtn">
                    💸 Withdraw ETH (Min ${MIN_WITHDRAWAL} ETH)
                </button>
                
                <div class="wallet-input-area">
                    <span>📋</span>
                    <input type="text" id="walletInput" placeholder="Paste your ETH wallet address" value="${savedWallet}">
                    <button id="saveWalletBtn">Save</button>
                </div>
                
                <div class="info-note">
                    ⚡ ${DAILY_LIMIT} ads/day • ${REWARD_AMOUNT} ETH per ad<br>
                    💎 Need ${Math.ceil(MIN_WITHDRAWAL / REWARD_AMOUNT)} ads to withdraw
                </div>
                
                <div class="warning-box" id="warningBox" style="${todayCount >= DAILY_LIMIT ? 'display:block' : 'display:none'}">
                    ⚠️ Daily limit reached! Come back tomorrow.
                </div>
            `;
            
            // Attach events
            document.getElementById('watchAdBtn')?.addEventListener('click', watchAd);
            document.getElementById('withdrawBtn')?.addEventListener('click', withdraw);
            document.getElementById('saveWalletBtn')?.addEventListener('click', saveWallet);
        }

        // Start app
        if (user) {
            loadData();
        } else {
            document.getElementById('app').innerHTML = `
                <div class="loading-box">
                    <div class="spinner"></div>
                    ⚠️ Please open this app from Telegram
                </div>
            `;
        }
    </script>
</body>
</html>
