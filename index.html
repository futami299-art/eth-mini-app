<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EthReward - Earn ETH</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="//libtl.com/sdk.js" data-zone="10819887" data-sdk="show_10819887"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
            position: relative;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Glow orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: 0;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: #667eea;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #f5576c;
            bottom: -150px;
            right: -150px;
            animation-delay: 5s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: #f093fb;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Main container */
        .container {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* User Card */
        .user-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideDown 0.5s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .user-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .user-avatar:hover {
            transform: scale(1.05);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info p {
            font-size: 12px;
            opacity: 0.6;
            font-family: monospace;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9), rgba(118, 75, 162, 0.9));
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 28px 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideDown 0.5s ease 0.05s backwards;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '✦';
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 100px;
            opacity: 0.1;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .balance-label {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .balance-amount {
            font-size: 44px;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .balance-usd {
            font-size: 16px;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* Progress Bar */
        .progress-section {
            margin-top: 20px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 18px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease 0.1s backwards;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 6px;
        }

        /* Ad Button */
        .ad-button {
            width: 100%;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            padding: 20px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4);
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite;
        }

        .ad-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .ad-button:hover::before {
            left: 100%;
        }

        .ad-button:active {
            transform: scale(0.97);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .ad-button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4); }
            50% { box-shadow: 0 8px 35px rgba(245, 87, 108, 0.7); }
        }

        /* Timer Display */
        .timer-display {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 0.3s ease;
        }

        .timer-text {
            font-size: 14px;
            opacity: 0.9;
        }

        .timer-seconds {
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            color: #f093fb;
        }

        /* Withdraw Section */
        .withdraw-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.5s ease 0.2s backwards;
        }

        .withdraw-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 2px solid #667eea;
            padding: 16px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .withdraw-btn:active {
            transform: scale(0.97);
            background: rgba(102, 126, 234, 0.2);
        }

        .paste-area {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 8px 8px 8px 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .paste-area:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
        }

        .paste-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 13px;
            font-family: monospace;
            outline: none;
        }

        .paste-area input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .paste-area button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .paste-area button:active {
            transform: scale(0.95);
        }

        /* Info Text */
        .info-text {
            font-size: 11px;
            text-align: center;
            opacity: 0.4;
            margin-top: 20px;
            line-height: 1.5;
        }

        /* Warning */
        .limit-warning {
            background: rgba(245, 87, 108, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid #f5576c;
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            font-size: 14px;
            margin-top: 15px;
            display: none;
            color: #f5576c;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Toast Message */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 1000;
            transition: transform 0.3s ease;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #f093fb;
            border-radius: 50%;
            margin: 0 auto 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    
    <div class="container">
        <div id="app">
            <div class="loading">
                <div class="spinner"></div>
                Loading your dashboard...
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Telegram WebApp initialize
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.enableClosingConfirmation();

        const user = tg.initDataUnsafe?.user;
        const BOT_API_URL = 'https://eth-telegram-bot.onrender.com';

        const DAILY_LIMIT = 5;
        const REWARD_AMOUNT = 0.00005;
        const MIN_WITHDRAWAL = 0.001;
        const ETH_PRICE_USD = 2000;
        const AD_DURATION = 15; // seconds

        let userBalance = 0;
        let todayClaims = 0;
        let isAdPlaying = false;
        let adTimer = null;
        let currentTimerSeconds = 0;

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = isError ? 'rgba(245, 87, 108, 0.9)' : 'rgba(0, 0, 0, 0.9)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function loadData() {
            const userId = user?.id;
            if (!userId) return;
            
            const savedBalance = localStorage.getItem(`balance_${userId}`);
            const savedDate = localStorage.getItem(`date_${userId}`);
            const savedClaims = localStorage.getItem(`claims_${userId}`);
            const today = new Date().toISOString().split('T')[0];
            
            if (savedDate === today) {
                todayClaims = parseInt(savedClaims) || 0;
                userBalance = parseFloat(savedBalance) || 0;
            } else {
                todayClaims = 0;
                userBalance = parseFloat(savedBalance) || 0;
                localStorage.setItem(`date_${userId}`, today);
                localStorage.setItem(`claims_${userId}`, '0');
            }
            
            renderUI();
        }

        function saveData() {
            const userId = user?.id;
            if (!userId) return;
            
            localStorage.setItem(`balance_${userId}`, userBalance);
            localStorage.setItem(`claims_${userId}`, todayClaims);
        }

        function giveReward() {
            if (todayClaims >= DAILY_LIMIT) {
                showToast('❌ Daily limit reached! Come back tomorrow.', true);
                return false;
            }
            
            todayClaims++;
            userBalance += REWARD_AMOUNT;
            saveData();
            renderUI();
            
            showToast(`✅ You earned ${REWARD_AMOUNT} ETH!`, false);
            tg.HapticFeedback.notificationOccurred('success');
            scheduleNextNotification();
            
            return true;
        }

        function startAdTimer() {
            return new Promise((resolve, reject) => {
                currentTimerSeconds = AD_DURATION;
                
                const timerDiv = document.createElement('div');
                timerDiv.className = 'timer-display';
                timerDiv.id = 'adTimer';
                timerDiv.innerHTML = `
                    <div class="timer-text">🎬 Watch ad to earn reward</div>
                    <div class="timer-seconds" id="timerSeconds">${AD_DURATION}</div>
                    <div class="timer-text">Please don't close the app</div>
                `;
                
                const watchBtn = document.getElementById('watchAdBtn');
                watchBtn.insertAdjacentElement('afterend', timerDiv);
                watchBtn.disabled = true;
                
                adTimer = setInterval(() => {
                    currentTimerSeconds--;
                    const timerEl = document.getElementById('timerSeconds');
                    if (timerEl) timerEl.textContent = currentTimerSeconds;
                    
                    if (currentTimerSeconds <= 0) {
                        clearInterval(adTimer);
                        adTimer = null;
                        document.getElementById('adTimer')?.remove();
                        watchBtn.disabled = false;
                        resolve();
                    }
                }, 1000);
            });
        }

        async function showRewardedAd() {
            if (todayClaims >= DAILY_LIMIT) {
                showToast(`⚠️ Daily limit reached! ${todayClaims}/${DAILY_LIMIT} ads today.`, true);
                return;
            }
            
            if (isAdPlaying) {
                showToast('⏳ Ad is already playing. Please wait...', true);
                return;
            }
            
            isAdPlaying = true;
            
            // Show warning before ad
            tg.showPopup({
                title: '📺 Watch Ad to Earn',
                message: `Watch a ${AD_DURATION} second ad to earn ${REWARD_AMOUNT} ETH.\n\n⚠️ Closing early = No reward!`,
                buttons: [{ id: 'watch', type: 'default', text: '🎬 Watch Now' }, { id: 'cancel', type: 'cancel', text: 'Cancel' }]
            }, async (buttonId) => {
                if (buttonId !== 'watch') {
                    isAdPlaying = false;
                    return;
                }
                
                try {
                    // Start timer
                    const timerPromise = startAdTimer();
                    
                    // Try Monetag SDK
                    if (typeof window.show_10819887 !== 'undefined') {
                        window.show_10819887({
                            onReward: async () => {
                                await timerPromise;
                                giveReward();
                                isAdPlaying = false;
                            },
                            onClose: () => {
                                clearInterval(adTimer);
                                document.getElementById('adTimer')?.remove();
                                document.getElementById('watchAdBtn').disabled = false;
                                isAdPlaying = false;
                                showToast('❌ You closed the ad early! No reward given.', true);
                                tg.HapticFeedback.notificationOccurred('error');
                            },
                            onError: () => {
                                clearInterval(adTimer);
                                document.getElementById('adTimer')?.remove();
                                document.getElementById('watchAdBtn').disabled = false;
                                isAdPlaying = false;
                                showToast('❌ Ad failed to load. Please try again.', true);
                            }
                        });
                    } else {
                        // Fallback with timer
                        await timerPromise;
                        giveReward();
                        isAdPlaying = false;
                    }
                } catch(e) {
                    clearInterval(adTimer);
                    document.getElementById('adTimer')?.remove();
                    document.getElementById('watchAdBtn').disabled = false;
                    isAdPlaying = false;
                    showToast('❌ Ad error. Please try again.', true);
                }
            });
        }

        function scheduleNextNotification() {
            const nextTime = new Date();
            nextTime.setHours(nextTime.getHours() + 6);
            
            fetch(`${BOT_API_URL}/api/schedule-notification`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: user?.id, notify_at: nextTime.toISOString() })
            }).catch(e => console.log('Schedule failed:', e));
        }

        function getUserPhotoUrl() {
            if (!user) return null;
            if (user.photo_url) return user.photo_url;
            return null;
        }

        function withdraw() {
            if (userBalance < MIN_WITHDRAWAL) {
                showToast(`❌ Need ${MIN_WITHDRAWAL} ETH to withdraw. You have ${userBalance.toFixed(8)} ETH`, true);
                return;
            }
            
            tg.showPopup({
                title: '💸 Withdraw ETH',
                message: `Amount: ${userBalance.toFixed(8)} ETH\n\nPaste your ETH wallet address:`,
                buttons: [{ id: 'ok', type: 'ok', text: 'Continue' }, { id: 'cancel', type: 'cancel' }]
            }, (buttonId) => {
                if (buttonId === 'ok') {
                    tg.showPopup({
                        title: '📝 Enter Wallet Address',
                        message: 'Paste your ETH address (starts with 0x)',
                        type: 'prompt'
                    }, (result) => {
                        if (result && result.startsWith('0x') && result.length === 42) {
                            const requests = JSON.parse(localStorage.getItem(`withdrawals_${user?.id}`) || '[]');
                            requests.push({ amount: userBalance, wallet: result, date: new Date().toISOString(), status: 'pending' });
                            localStorage.setItem(`withdrawals_${user?.id}`, JSON.stringify(requests));
                            
                            const withdrawnAmount = userBalance;
                            userBalance = 0;
                            saveData();
                            renderUI();
                            
                            showToast(`✅ Withdrawal request submitted! ${withdrawnAmount.toFixed(8)} ETH`, false);
                            tg.HapticFeedback.notificationOccurred('success');
                        } else {
                            showToast('❌ Invalid ETH address! Must be 42 chars starting with 0x', true);
                        }
                    });
                }
            });
        }

        function renderUI() {
            const remaining = DAILY_LIMIT - todayClaims;
            const usdValue = userBalance * ETH_PRICE_USD;
            const photoUrl = getUserPhotoUrl();
            const progressPercent = (todayClaims / DAILY_LIMIT) * 100;
            
            document.getElementById('app').innerHTML = `
                <div class="user-card">
                    <div class="user-avatar">
                        ${photoUrl ? `<img src="${photoUrl}" onerror="this.src='https://telegram.org/img/tl_card_people_1.jpg'">` : '👤'}
                    </div>
                    <div class="user-info">
                        <h3>${user?.first_name || 'User'} ${user?.last_name || ''}</h3>
                        <p>🆔 ${user?.id || '-'}</p>
                    </div>
                </div>
                
                <div class="balance-card">
                    <div class="balance-label">💰 YOUR BALANCE</div>
                    <div class="balance-amount" id="balanceAmount">${userBalance.toFixed(8)} ETH</div>
                    <div class="balance-usd">≈ $${usdValue.toFixed(2)} USD</div>
                    <div class="progress-section">
                        <div class="progress-label">
                            <span>Daily Progress</span>
                            <span>${todayClaims}/${DAILY_LIMIT}</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-fill" style="width: ${progressPercent}%"></div>
                        </div>
                    </div>
                </div>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value">${todayClaims}</div>
                        <div class="stat-label">Today's Claims</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${remaining}</div>
                        <div class="stat-label">Remaining</div>
                    </div>
                </div>
                
                <button class="ad-button" id="watchAdBtn" ${todayClaims >= DAILY_LIMIT ? 'disabled' : ''}>
                    🎬 Watch Ad & Earn ${REWARD_AMOUNT} ETH
                </button>
                
                <div class="withdraw-section">
                    <button class="withdraw-btn" id="withdrawBtn">
                        💸 Withdraw ETH (Min ${MIN_WITHDRAWAL} ETH)
                    </button>
                    <div class="paste-area">
                        <span>📋</span>
                        <input type="text" id="walletInput" placeholder="Paste your ETH address here (0x...)" value="${localStorage.getItem(`saved_wallet_${user?.id}`) || ''}">
                        <button id="saveWalletBtn">Save</button>
                    </div>
                </div>
                
                <div class="info-text">
                    ⚡ ${DAILY_LIMIT} ads/day • ${REWARD_AMOUNT} ETH per ad<br>
                    💎 Min withdrawal: ${MIN_WITHDRAWAL} ETH (${Math.ceil(MIN_WITHDRAWAL / REWARD_AMOUNT)} ads)
                </div>
                
                <div class="limit-warning" id="limitWarning" style="${todayClaims >= DAILY_LIMIT ? 'display:block' : 'display:none'}">
                    ⚠️ You've reached today's limit! Come back tomorrow.
                </div>
            `;
            
            document.getElementById('watchAdBtn')?.addEventListener('click', showRewardedAd);
            document.getElementById('withdrawBtn')?.addEventListener('click', withdraw);
            document.getElementById('saveWalletBtn')?.addEventListener('click', () => {
                const wallet = document.getElementById('walletInput')?.value.trim();
                if (wallet && wallet.startsWith('0x') && wallet.length === 42) {
                    localStorage.setItem(`saved_wallet_${user?.id}`, wallet);
                    showToast('✅ Wallet address saved!', false);
                    tg.HapticFeedback.impactOccurred('light');
                } else if (wallet) {
                    showToast('❌ Invalid ETH address!', true);
                }
            });
            
            const balanceEl = document.getElementById('balanceAmount');
            if (balanceEl) {
                balanceEl.classList.add('balance-update');
                setTimeout(() => balanceEl.classList.remove('balance-update'), 300);
            }
        }

        if (user) {
            loadData();
        } else {
            document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div>⚠️ Please open from Telegram</div>';
        }
    </script>
</body>
</html>
